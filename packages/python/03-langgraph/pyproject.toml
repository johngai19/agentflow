[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "langgraph-starter"
version = "0.1.0"
description = "LangGraph Agent Starter - Graph-based stateful workflows"
requires-python = ">=3.11"
dependencies = [
    "langgraph>=0.1",
    "langchain>=0.2",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=4.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.coverage.run]
source = ["src"]
